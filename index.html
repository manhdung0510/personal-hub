<!DOCTYPE html>
<html lang="vi" class="h-full overflow-hidden">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Personal Hub</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            padding-top: env(safe-area-inset-top); 
            padding-bottom: env(safe-area-inset-bottom); 
        }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-card { background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .active-tab { background: rgba(99, 102, 241, 0.15); color: #818cf8 !important; border: 1px solid rgba(99, 102, 241, 0.3); }
        .fade-in { animation: fadeIn 1.2s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
        .intro-hide { opacity: 0; pointer-events: none; transition: opacity 0.8s ease-in-out; }
        .scroll-container { -webkit-overflow-scrolling: touch; overscroll-behavior-y: contain; }
        /* Fix cho iPhone Home Indicator */
        .bottom-safe-nav { bottom: calc(0.5rem + env(safe-area-inset-bottom)); }
    </style>
</head>
<body class="bg-[#090d16] text-gray-100 h-full flex flex-col justify-between overflow-hidden select-none">

    <div id="intro-screen" class="fixed inset-0 bg-[#090d16] z-[999] flex flex-col items-center justify-center text-center px-6">
        <div class="space-y-4 fade-in">
            <div class="text-4xl animate-pulse">✨🔮</div>
            <h2 class="text-xl font-medium tracking-wide bg-gradient-to-r from-pink-300 via-purple-300 to-indigo-300 bg-clip-text text-transparent">Chào mừng bạn ghé thăm không gian riêng...</h2>
            <p class="text-[11px] text-gray-500 font-mono tracking-widest uppercase">Loading your personal hub</p>
        </div>
    </div>

    <header class="glass px-6 py-4 flex justify-between items-center z-10 sticky top-0 shrink-0">
        <div>
            <h1 class="text-xl font-bold tracking-tight bg-gradient-to-r from-pink-400 via-purple-400 to-indigo-400 bg-clip-text text-transparent">Personal Hub ✨</h1>
            <p class="text-[10px] text-gray-500 font-mono mt-0.5">Secure Local Storage</p>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto scroll-container px-4 py-6 space-y-6 pb-32">
        <section id="tab-habits" class="tab-content space-y-4">
            <div class="flex justify-between items-center">
                <div><h2 class="text-lg font-semibold text-gray-200">Trạm Thói Quen</h2><p class="text-xs text-gray-400">Tự động làm mới trạng thái</p></div>
                <button onclick="openFormModal('habit')" class="text-xs bg-indigo-600/90 hover:bg-indigo-600 px-3.5 py-2 rounded-xl font-medium active:scale-95 transition shadow-lg shadow-indigo-600/20">+ Thêm mới</button>
            </div>
            <div id="habit-list" class="space-y-3"></div>
        </section>

        <section id="tab-vault" class="tab-content hidden space-y-4">
            <div class="flex justify-between items-center">
                <div><h2 class="text-lg font-semibold text-gray-200">The Infinite Vault</h2><p class="text-xs text-gray-400">Kho lưu trữ vạn năng</p></div>
                <button onclick="openFormModal('vault')" class="text-xs bg-pink-600/90 hover:bg-pink-600 px-3.5 py-2 rounded-xl font-medium active:scale-95 transition shadow-lg shadow-pink-600/20">+ Cất giấu</button>
            </div>
            <div class="grid grid-cols-4 gap-1.5 text-center text-[11px]">
                <button onclick="filterVault('wishlist')" id="vbtn-wishlist" class="vault-filter-btn bg-pink-600 py-2.5 rounded-xl font-medium text-white transition">🛍️ Wishlist</button>
                <button onclick="filterVault('media')" id="vbtn-media" class="vault-filter-btn bg-gray-900/60 border border-gray-800 py-2.5 rounded-xl text-gray-400 transition">🎬 Media</button>
                <button onclick="filterVault('study')" id="vbtn-study" class="vault-filter-btn bg-gray-900/60 border border-gray-800 py-2.5 rounded-xl text-gray-400 transition">📚 Study</button>
                <button onclick="filterVault('braindump')" id="vbtn-braindump" class="vault-filter-btn bg-gray-900/60 border border-gray-800 py-2.5 rounded-xl text-gray-400 transition">🧠 Dump</button>
            </div>
            <div id="vault-list" class="space-y-3"></div>
        </section>

        <section id="tab-milestones" class="tab-content hidden space-y-4">
            <div class="flex justify-between items-center">
                <div><h2 class="text-lg font-semibold text-gray-200">Mốc Kỷ Niệm</h2><p class="text-xs text-gray-400">Tính toán chính xác</p></div>
                <button onclick="openFormModal('milestone')" class="text-xs bg-emerald-600/90 hover:bg-emerald-600 px-3.5 py-2 rounded-xl font-medium active:scale-95 transition shadow-lg shadow-emerald-600/20">+ Tạo sự kiện</button>
            </div>
            <div id="milestone-list" class="space-y-4"></div>
        </section>
    </main>

    <nav class="glass fixed bottom-safe-nav left-4 right-4 h-16 rounded-2xl flex justify-around items-center px-2 z-20 shadow-2xl">
        <button onclick="switchTab('habits')" id="nav-habits" class="nav-btn flex flex-col items-center justify-center text-gray-400 w-16 h-12 rounded-xl transition-all"><span class="text-lg">🔄</span><span class="text-[10px] font-semibold mt-0.5">Habits</span></button>
        <button onclick="switchTab('vault')" id="nav-vault" class="nav-btn flex flex-col items-center justify-center text-gray-400 w-16 h-12 rounded-xl transition-all"><span class="text-lg">📦</span><span class="text-[10px] font-semibold mt-0.5">Vault</span></button>
        <button onclick="switchTab('milestones')" id="nav-milestones" class="nav-btn flex flex-col items-center justify-center text-gray-400 w-16 h-12 rounded-xl transition-all"><span class="text-lg">⏳</span><span class="text-[10px] font-semibold mt-0.5">Milestones</span></button>
    </nav>

    <div id="modal-form" class="fixed inset-0 bg-black/80 backdrop-blur-lg hidden items-center justify-center p-6 z-40">
        <div class="glass-card w-full max-w-sm rounded-2xl p-6 space-y-4 shadow-2xl">
            <div class="text-center space-y-1">
                <h3 id="form-title" class="text-base font-semibold text-gray-100">Thêm mục mới</h3>
                <p id="form-desc" class="text-xs text-gray-400">Vui lòng điền thông tin bên dưới.</p>
            </div>
            <div id="form-fields" class="space-y-3"></div>
            <div class="flex gap-2 pt-2">
                <button onclick="closeFormModal()" class="w-1/2 bg-gray-900 border border-gray-800 py-2.5 rounded-xl text-sm font-medium">Hủy</button>
                <button onclick="submitForm()" class="w-1/2 bg-indigo-600 py-2.5 rounded-xl text-sm font-medium shadow-lg shadow-indigo-600/30">Xác nhận</button>
            </div>
        </div>
    </div>

    <script>
        let habits = JSON.parse(localStorage.getItem('local_habits')) || [];
        let vaultItems = JSON.parse(localStorage.getItem('local_vault')) || [];
        let milestones = JSON.parse(localStorage.getItem('local_milestones')) || [];
        let currentVaultCategory = 'wishlist'; let countdownInterval; let currentFormType = '';
        
        function saveData(type) {
            if (type === 'habits') localStorage.setItem('local_habits', JSON.stringify(habits));
            if (type === 'vault') localStorage.setItem('local_vault', JSON.stringify(vaultItems));
            if (type === 'milestones') localStorage.setItem('local_milestones', JSON.stringify(milestones));
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(`tab-${tabName}`).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active-tab'));
            document.getElementById(`nav-${tabName}`).classList.add('active-tab');
            if (tabName === 'habits') loadHabits();
            if (tabName === 'vault') loadVault();
            if (tabName === 'milestones') loadMilestones();
        }

        function openFormModal(type) {
            currentFormType = type;
            const fieldsContainer = document.getElementById('form-fields');
            fieldsContainer.innerHTML = '';
            if (type === 'habit') {
                fieldsContainer.innerHTML = `<input type="text" id="add-habit-name" placeholder="Tên thói quen..." class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-sm text-white">`;
            } else if (type === 'vault') {
                fieldsContainer.innerHTML = `<input type="text" id="add-vault-title" placeholder="Tiêu đề..." class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-sm text-white mb-2"><input type="text" id="add-vault-url" placeholder="Link (nếu có)..." class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-sm text-white">`;
            } else if (type === 'milestone') {
                fieldsContainer.innerHTML = `<input type="text" id="add-ms-title" placeholder="Tên sự kiện..." class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-sm text-white mb-2"><input type="text" id="add-ms-date" value="${new Date().getFullYear()}-10-20 00:00" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-sm text-white">`;
            }
            document.getElementById('modal-form').classList.replace('hidden', 'flex');
        }

        function closeFormModal() { document.getElementById('modal-form').classList.replace('flex', 'hidden'); }

        function submitForm() {
            const uuid = () => Math.random().toString(36).substring(2, 15);
            if (currentFormType === 'habit') {
                const name = document.getElementById('add-habit-name').value.trim();
                if (name) { habits.push({ id: uuid(), name: name, streak_count: 0, logs: [] }); saveData('habits'); loadHabits(); }
            } else if (currentFormType === 'vault') {
                const title = document.getElementById('add-vault-title').value.trim();
                const url = document.getElementById('add-vault-url').value.trim();
                if (title) { vaultItems.push({ id: uuid(), title: title, url: url || null, category: currentVaultCategory }); saveData('vault'); loadVault(); }
            } else if (currentFormType === 'milestone') {
                const title = document.getElementById('add-ms-title').value.trim();
                const dateStr = document.getElementById('add-ms-date').value.trim();
                if (title && dateStr) { milestones.push({ id: uuid(), title: title, event_date: new Date(dateStr).toISOString() }); saveData('milestones'); loadMilestones(); }
            }
            closeFormModal();
        }

        function loadHabits() {
            const list = document.getElementById('habit-list'); list.innerHTML = '';
            const today = new Date().toISOString().split('T')[0];
            habits.forEach(habit => {
                const isDone = habit.logs?.includes(today);
                list.innerHTML += `<div class="glass-card p-4 rounded-2xl flex justify-between items-center"><div class="flex-1"><h4 class="text-sm font-medium">${habit.name}</h4><p class="text-xs text-pink-400">Chuỗi: ${habit.streak_count}</p></div><button onclick="toggleHabit('${habit.id}', ${!!isDone})" class="w-10 h-10 rounded-xl ${isDone ? 'bg-indigo-600' : 'bg-gray-800'}">✓</button></div>`;
            });
        }
        
        function toggleHabit(id, isDone) {
            const habit = habits.find(h => h.id === id);
            const today = new Date().toISOString().split('T')[0];
            if (!isDone) { habit.logs.push(today); habit.streak_count++; } 
            else { habit.logs = habit.logs.filter(d => d !== today); habit.streak_count--; }
            saveData('habits'); loadHabits();
        }

        function loadVault() {
            const list = document.getElementById('vault-list'); list.innerHTML = '';
            vaultItems.filter(i => i.category === currentVaultCategory).forEach(item => {
                list.innerHTML += `<div class="glass-card p-3 rounded-xl flex justify-between items-center"><span class="text-xs">${item.title}</span><button onclick="deleteVaultItem('${item.id}')" class="text-gray-500">✕</button></div>`;
            });
        }

        function deleteVaultItem(id) { vaultItems = vaultItems.filter(i => i.id !== id); saveData('vault'); loadVault(); }

        function loadMilestones() {
            const list = document.getElementById('milestone-list'); list.innerHTML = '';
            milestones.forEach(m => {
                const diff = new Date(m.event_date) - new Date();
                const d = Math.floor(diff / 86400000);
                list.innerHTML += `<div class="glass-card p-4 rounded-2xl text-center"><h4 class="font-bold text-sm">${m.title}</h4><p class="text-xs">${d > 0 ? d + ' ngày nữa' : 'Đã qua'}</p></div>`;
            });
        }

        function filterVault(cat) { currentVaultCategory = cat; loadVault(); }

        window.addEventListener('DOMContentLoaded', () => { 
            switchTab('habits'); 
            setTimeout(() => { document.getElementById('intro-screen').classList.add('intro-hide'); }, 2000);
        });
    </script>
</body>
</html>
