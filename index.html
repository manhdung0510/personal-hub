<!DOCTYPE html>
<html lang="vi" class="h-full overflow-hidden">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Trợ Lý Cá Nhân</title>
    <link rel="apple-touch-icon" href="icon.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Trợ Lý Nhỏ">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#090d16] text-gray-100 h-full flex flex-col justify-between overflow-hidden select-none pt-safe pb-safe">

    <div id="intro-screen" class="fixed inset-0 bg-[#090d16] z-[999] flex flex-col items-center justify-center text-center px-6">
        <div class="space-y-4 fade-in">
            <div class="text-4xl animate-pulse">✨🔮</div>
            <h2 class="text-xl font-medium tracking-wide bg-gradient-to-r from-pink-300 via-purple-300 to-indigo-300 bg-clip-text text-transparent">
                Đang khởi động Trợ lý...
            </h2>
        </div>
    </div>

    <div id="toast-container" class="fixed top-12 right-4 left-4 z-[1000] flex flex-col gap-2 pointer-events-none"></div>

    <header class="glass px-6 py-4 flex justify-between items-center z-10 sticky top-0 shrink-0 pt-8">
        <div>
            <h1 class="text-lg font-bold tracking-tight bg-gradient-to-r from-pink-400 via-purple-400 to-indigo-400 bg-clip-text text-transparent">Trợ Lý Cá Nhân ✨</h1>
        </div>
        <div class="flex gap-2 items-center">
            <button onclick="openSettings()" class="text-xl hover:rotate-90 transition-transform duration-300 p-1">⚙️</button>
            <button onclick="exportData()" class="text-[10px] bg-gray-800/80 hover:bg-gray-700 px-2.5 py-1.5 rounded-lg text-gray-300 transition">Xuất</button>
            <label class="text-[10px] bg-indigo-600/80 hover:bg-indigo-600 px-2.5 py-1.5 rounded-lg text-white transition cursor-pointer">
                Nhập
                <input type="file" accept=".json" onchange="importData(event)" class="hidden">
            </label>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto scroll-container px-4 py-4 space-y-6 pb-32">
        <section id="tab-vault" class="tab-content space-y-4">
            <div class="flex justify-between items-center">
                <div>
                    <h2 id="vault-title-text" class="text-base font-semibold text-gray-200">Kho Lưu Trữ Vô Tận</h2>
                    <p id="vault-desc-text" class="text-xs text-gray-400">Nơi lưu trữ những món đồ riêng tư của bạn</p>
                </div>
                <button onclick="openFormModal('vault')" class="text-xs bg-pink-600/90 hover:bg-pink-600 px-3 py-2 rounded-xl font-medium active:scale-95 transition">+ Cất đồ</button>
            </div>
            <input type="text" id="vault-search" oninput="loadVault()" placeholder="🔍 Tìm kiếm nhanh trong kho..." class="w-full bg-gray-900/50 border border-gray-800 rounded-xl px-4 py-2.5 text-xs outline-none focus:border-pink-500 text-gray-300">
            <div class="grid grid-cols-4 gap-1.5 text-center text-[10px]">
                <button onclick="filterVault('wishlist')" id="vbtn-wishlist" class="vault-filter-btn bg-pink-600 py-2 rounded-xl text-white font-medium">🛍️ Mua sắm</button>
                <button onclick="filterVault('media')" id="vbtn-media" class="vault-filter-btn bg-gray-900/60 border border-gray-800 py-2 rounded-xl text-gray-400">🎬 Giải trí</button>
                <button onclick="filterVault('study')" id="vbtn-study" class="vault-filter-btn bg-gray-900/60 border border-gray-800 py-2 rounded-xl text-gray-400">📚 Học tập</button>
                <button onclick="filterVault('braindump')" id="vbtn-braindump" class="vault-filter-btn bg-gray-900/60 border border-gray-800 py-2 rounded-xl text-gray-400">🤫 Bí mật</button>
            </div>
            <div id="vault-list" class="space-y-3"></div>
        </section>
    </main>

    <div id="modal-settings" class="fixed inset-0 bg-black/80 backdrop-blur-lg hidden items-center justify-center p-6 z-[60]">
        <div class="glass-card w-full max-w-sm rounded-2xl p-6 space-y-4 shadow-2xl scale-95 transition-transform" id="settings-card">
            <div class="text-center space-y-1 mb-2">
                <h3 class="text-base font-semibold text-gray-100">⚙️ Cài đặt hệ thống</h3>
                <p class="text-xs text-gray-400">Tùy chỉnh cấu hình thông báo app</p>
            </div>
            <div class="space-y-3">
                <div>
                    <label class="text-[11px] text-gray-400 block mb-1">Thời gian hiển thị thông báo (giây)</label>
                    <input type="number" id="set-toast-time" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-2.5 text-sm text-white">
                </div>
            </div>
            <div class="flex gap-2 pt-2">
                <button onclick="closeSettings()" class="w-1/2 bg-gray-900 border border-gray-800 py-2.5 rounded-xl text-sm font-medium">Đóng</button>
                <button onclick="saveSettings()" class="w-1/2 bg-indigo-600 py-2.5 rounded-xl text-sm font-medium">Lưu cấu hình</button>
            </div>
        </div>
    </div>

    <div id="modal-form" class="fixed inset-0 bg-black/80 backdrop-blur-lg hidden items-center justify-center p-6 z-40">
        <div class="glass-card w-full max-w-sm rounded-2xl p-6 space-y-4 shadow-2xl scale-95 transition-transform" id="form-card">
            <div class="text-center space-y-1">
                <h3 id="form-title" class="text-base font-semibold text-gray-100">Thêm mục</h3>
                <p id="form-desc" class="text-xs text-gray-400"></p>
            </div>
            <div id="form-fields" class="space-y-3"></div>
            <div class="flex gap-2 pt-2">
                <button onclick="closeFormModal()" class="w-1/2 bg-gray-900 border border-gray-800 py-2.5 rounded-xl text-sm font-medium">Hủy</button>
                <button onclick="submitForm()" class="w-1/2 bg-indigo-600 py-2.5 rounded-xl text-sm font-medium">Lưu</button>
            </div>
        </div>
    </div>

    <div id="modal-confirm" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden items-center justify-center p-6 z-50 transition-opacity opacity-0">
        <div class="glass-card w-full max-w-xs rounded-2xl p-5 space-y-4 text-center">
            <div class="text-3xl mb-2">⚠️</div>
            <h3 class="text-sm font-semibold text-gray-100" id="confirm-msg">Xác nhận xóa?</h3>
            <div class="flex gap-2 pt-2">
                <button onclick="closeConfirmModal()" class="w-1/2 bg-gray-900 border border-gray-800 py-2.5 rounded-xl text-xs font-medium">Hủy</button>
                <button id="btn-confirm-action" class="w-1/2 bg-red-600 py-2.5 rounded-xl text-xs font-medium">Xóa</button>
            </div>
        </div>
    </div>

    <script>
        let appSettings = JSON.parse(localStorage.getItem('app_settings')) || { toastTime: 5 };
        let vaultItems = JSON.parse(localStorage.getItem('local_vault')) || [];

        let currentVaultCategory = 'wishlist';
        let currentFormType = '', currentEditId = null;

        /* --- KÍCH HOẠT INDEXEDDB ĐỂ LƯU TRỮ KHÔNG GIỚI HẠN FILE --- */
        let db;
        const dbRequest = indexedDB.open("SecureMomentsDB", 1);
        dbRequest.onupgradeneeded = function(e) {
            let database = e.target.result;
            if (!database.objectStoreNames.contains("mediaFiles")) {
                database.createObjectStore("mediaFiles", { keyPath: "id" });
            }
        };
        dbRequest.onsuccess = function(e) { db = e.target.result; loadVault(); };
        dbRequest.onerror = function() { console.error("Không khởi động được IndexedDB"); };

        function saveMediaToDB(id, blobData, callback) {
            let transaction = db.transaction(["mediaFiles"], "readwrite");
            let store = transaction.objectStore("mediaFiles");
            let request = store.put({ id: id, data: blobData });
            request.onsuccess = callback;
        }

        function getMediaFromDB(id, callback) {
            let transaction = db.transaction(["mediaFiles"], "readonly");
            let store = transaction.objectStore("mediaFiles");
            let request = store.get(id);
            request.onsuccess = function(e) { callback(e.target.result ? e.target.result.data : null); };
        }

        function deleteMediaFromDB(id) {
            let transaction = db.transaction(["mediaFiles"], "readwrite");
            let store = transaction.objectStore("mediaFiles");
            store.delete(id);
        }

        /* --- SETTINGS --- */
        function openSettings() {
            document.getElementById('set-toast-time').value = appSettings.toastTime;
            const modal = document.getElementById('modal-settings');
            modal.classList.replace('hidden', 'flex');
            setTimeout(() => document.getElementById('settings-card').classList.replace('scale-95', 'scale-100'), 10);
        }
        function closeSettings() {
            document.getElementById('settings-card').classList.replace('scale-100', 'scale-95');
            setTimeout(() => document.getElementById('modal-settings').classList.replace('flex', 'hidden'), 200);
        }
        function saveSettings() {
            appSettings.toastTime = parseInt(document.getElementById('set-toast-time').value) || 5;
            localStorage.setItem('app_settings', JSON.stringify(appSettings));
            closeSettings(); showToast("Đã lưu cài đặt!");
        }

        /* --- TOAST ALARMS --- */
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-emerald-500/95 border-emerald-500 text-white' : 'bg-red-500/95 border-red-500 text-white';
            
            toast.className = `border px-4 py-3 rounded-xl text-xs font-semibold flex items-center gap-2 shadow-2xl backdrop-blur-md transition-all duration-300 toast-enter ${bgColor}`;
            toast.innerHTML = `<span>${type === 'success' ? '✓' : '✕'}</span> ${message}`;
            
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.replace('toast-enter', 'toast-leave');
                setTimeout(() => toast.remove(), 400);
            }, appSettings.toastTime * 1000);
        }

        /* --- FORM MODAL BUILDER --- */
        function openFormModal(type, editId = null) {
            currentFormType = type; currentEditId = editId;
            const fields = document.getElementById('form-fields'); fields.innerHTML = '';
            let defName = '', defUrl = '';

            if (editId) {
                const v = vaultItems.find(x => x.id === editId); 
                defName = v?.title || ''; 
                defUrl = v?.url || '';
            }

            if (currentVaultCategory === 'wishlist') {
                document.getElementById('form-title').innerText = editId ? "Sửa Mục Mua Sắm" : "Thêm Vào Wishlist 🛍️";
                document.getElementById('form-desc').innerText = "Lưu trữ món đồ yêu thích bạn muốn sở hữu.";
                fields.innerHTML = `
                    <input type="text" id="add-vault-title" value="${defName}" placeholder="Tên món đồ cần mua..." class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-sm text-white mb-2 outline-none focus:border-pink-500">
                    <input type="text" id="add-vault-url" value="${defUrl}" placeholder="Link liên kết shop (nếu có)..." class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-pink-500">`;
            } else if (currentVaultCategory === 'media') {
                document.getElementById('form-title').innerText = editId ? "Sửa Mục Giải Trí" : "Lưu Trữ Media 🎬";
                document.getElementById('form-desc').innerText = "Cất giữ phim ảnh, bài hát hoặc video hay.";
                fields.innerHTML = `
                    <input type="text" id="add-vault-title" value="${defName}" placeholder="Tên phim / Tên bài hát..." class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-sm text-white mb-2 outline-none focus:border-pink-500">
                    <input type="text" id="add-vault-url" value="${defUrl}" placeholder="Link xem phim / Nghe nhạc..." class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-pink-500">`;
            } else if (currentVaultCategory === 'study') {
                document.getElementById('form-title').innerText = editId ? "Sửa Tài Liệu" : "Cất Giữ Tài Liệu 📚";
                document.getElementById('form-desc').innerText = "Lưu trữ bài viết hoặc link học tập quan trọng.";
                fields.innerHTML = `
                    <input type="text" id="add-vault-title" value="${defName}" placeholder="Tên tài liệu / Tên sách..." class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-sm text-white mb-2 outline-none focus:border-pink-500">
                    <input type="text" id="add-vault-url" value="${defUrl}" placeholder="Link Drive / Tài liệu tham khảo..." class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-pink-500">`;
            } else if (currentVaultCategory === 'braindump') {
                document.getElementById('form-title').innerText = editId ? "Sửa Khoảnh Khắc" : "Cất Giấu Khoảnh Khắc 🤫";
                document.getElementById('form-desc').innerText = editId ? "Cập nhật ghi chú cho khoảnh khắc này" : "Tải ảnh hoặc video riêng tư (Lưu trữ không giới hạn dung lượng máy).";
                
                let fileUploadSection = '';
                if (!editId) {
                    fileUploadSection = `
                        <div class="relative w-full bg-gray-950 border border-gray-800 border-dashed rounded-xl p-4 text-center cursor-pointer hover:border-pink-500 transition mb-2">
                            <input type="file" id="add-vault-file" accept="image/*,video/*" class="absolute inset-0 opacity-0 cursor-pointer" onchange="updateFileNameDisplay(this)">
                            <span id="file-upload-status" class="text-xs text-gray-400">📸 Chọn ảnh hoặc video gốc bất kỳ</span>
                        </div>`;
                }
                fields.innerHTML = `
                    <input type="text" id="add-vault-title" value="${defName}" placeholder="Ghi chú ngắn về khoảnh khắc này..." class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-sm text-white mb-2 outline-none focus:border-pink-500">
                    ${fileUploadSection}`;
            }

            const m = document.getElementById('modal-form'); m.classList.replace('hidden', 'flex');
            setTimeout(() => document.getElementById('form-card').classList.replace('scale-95', 'scale-100'), 10);
        }

        function updateFileNameDisplay(input) {
            const status = document.getElementById('file-upload-status');
            if (input.files && input.files[0]) {
                status.innerText = `✅ Đã chọn: ${input.files[0].name.slice(0, 20)}...`;
                status.classList.add('text-pink-400');
            }
        }

        function closeFormModal() {
            document.getElementById('form-card').classList.replace('scale-100', 'scale-95');
            setTimeout(() => document.getElementById('modal-form').classList.replace('flex', 'hidden'), 200);
        }

        function submitForm() {
            const uuid = () => Math.random().toString(36).substring(2, 15);
            const title = document.getElementById('add-vault-title').value.trim();
            if (!title) return showToast("Thiếu tiêu đề rồi ông!", "error");

            if (currentVaultCategory === 'braindump') {
                if (currentEditId) {
                    const idx = vaultItems.findIndex(v => v.id === currentEditId);
                    if (idx > -1) { vaultItems[idx].title = title; }
                    saveData('vault'); loadVault(); closeFormModal(); showToast("Đã cập nhật ghi chú!");
                } else {
                    const fileInput = document.getElementById('add-vault-file');
                    if (fileInput.files && fileInput.files[0]) {
                        const file = fileInput.files[0];
                        const itemId = uuid();
                        
                        // Lưu file gốc dưới dạng Blob trực tiếp vào IndexedDB (không lo giới hạn dung lượng)
                        saveMediaToDB(itemId, file, function() {
                            vaultItems.push({ 
                                id: itemId, 
                                title: title, 
                                url: null, 
                                isIndexedDB: true,
                                fileType: file.type,
                                category: 'braindump' 
                            });
                            saveData('vault'); loadVault(); closeFormModal(); showToast("Cất giấu thành công! 🤫");
                        });
                    } else {
                        return showToast("Vui lòng chọn ảnh hoặc video!", "error");
                    }
                }
            } else {
                const url = document.getElementById('add-vault-url').value.trim();
                if (currentEditId) {
                    const idx = vaultItems.findIndex(v => v.id === currentEditId);
                    if (idx > -1) { vaultItems[idx].title = title; vaultItems[idx].url = url; }
                } else { 
                    vaultItems.push({ id: uuid(), title, url, category: currentVaultCategory }); 
                }
                saveData('vault'); loadVault(); closeFormModal(); showToast("Ghi nhận dữ liệu thành công!");
            }
        }

        /* --- CONFIRM SYSTEM --- */
        let confirmActionCallback = null;
        function customConfirm(message, callback) {
            document.getElementById('confirm-msg').innerText = message;
            const modal = document.getElementById('modal-confirm');
            modal.classList.replace('hidden', 'flex'); setTimeout(() => modal.classList.replace('opacity-0', 'opacity-100'), 10);
            confirmActionCallback = callback;
        }
        function closeConfirmModal() {
            const modal = document.getElementById('modal-confirm');
            modal.classList.replace('opacity-100', 'opacity-0'); setTimeout(() => modal.classList.replace('flex', 'hidden'), 300);
            confirmActionCallback = null;
        }
        document.getElementById('btn-confirm-action').addEventListener('click', () => { if(confirmActionCallback) confirmActionCallback(); closeConfirmModal(); });

        function saveData(type) {
            if (type === 'vault') localStorage.setItem('local_vault', JSON.stringify(vaultItems));
        }

        // Xuất file text nhẹ nhàng cho cấu trúc danh mục
        function exportData() {
            const data = { vault: vaultItems, appSettings };
            const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `infinite_vault_struct.json`; a.click();
            showToast("Đã xuất cấu trúc file!");
        }

        function importData(event) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const d = JSON.parse(e.target.result);
                    if (d.vault) { vaultItems = d.vault; saveData('vault'); }
                    if (d.appSettings) { appSettings = d.appSettings; localStorage.setItem('app_settings', JSON.stringify(appSettings)); }
                    showToast("Đã nhập dữ liệu!"); setTimeout(() => location.reload(), 800);
                } catch (err) { showToast("File không đúng chuẩn!", "error"); }
            };
            reader.readAsText(file);
        }

        function loadVault() {
            if (!db) return; // Đợi DB khởi động xong mới render
            const container = document.getElementById('vault-list'); container.innerHTML = '';
            const search = document.getElementById('vault-search').value.toLowerCase();
            let items = vaultItems.filter(i => i.category === currentVaultCategory);
            if(search) items = items.filter(i => i.title.toLowerCase().includes(search));
            
            if(items.length === 0) {
                const emptyText = currentVaultCategory === 'braindump' ? 'Chưa có khoảnh khắc bí mật nào 🤫' : 'Ngăn kéo trống.';
                return container.innerHTML = renderEmptyState(emptyText, currentVaultCategory === 'braindump' ? '🔒' : '📦');
            }

            items.forEach(item => {
                const card = document.createElement('div');
                
                if (item.category === 'braindump' && item.isIndexedDB) {
                    card.className = 'glass-card p-4 rounded-2xl flex flex-col gap-3 fade-in';
                    const mediaContainerId = `media-container-${item.id}`;
                    
                    card.innerHTML = `
                        <div class="flex justify-between items-start gap-2">
                            <div class="overflow-hidden flex-1"><h4 class="font-medium text-xs text-gray-200">${item.title}</h4></div>
                            <div class="flex gap-2 shrink-0">
                                <button onclick="openFormModal('vault', '${item.id}')" class="text-xs text-gray-500">✏️</button>
                                <button onclick="deleteVaultItem('${item.id}')" class="text-xs text-gray-500">✕</button>
                            </div>
                        </div>
                        <div id="${mediaContainerId}" class="w-full text-center py-4 text-xs text-gray-600">⌛ Đang giải mã...</div>`;
                    
                    container.appendChild(card);

                    // Lấy dữ liệu file nhị phân gốc từ IndexedDB ra để hiển thị mượt mà
                    getMediaFromDB(item.id, function(blobFile) {
                        const mediaBox = document.getElementById(mediaContainerId);
                        if (mediaBox && blobFile) {
                            const objectURL = URL.createObjectURL(blobFile);
                            if (item.fileType && item.fileType.startsWith('video/')) {
                                mediaBox.outerHTML = `<video src="${objectURL}" controls class="w-full max-h-64 rounded-xl object-contain bg-black/40 mt-1" playsinline></video>`;
                            } else {
                                mediaBox.outerHTML = `<img src="${objectURL}" class="w-full max-h-64 rounded-xl object-contain bg-black/40 mt-1" loading="lazy">`;
                            }
                        } else if (mediaBox) {
                            mediaBox.innerText = "✕ Không tìm thấy file gốc trên thiết bị.";
                        }
                    });
                } else {
                    card.className = 'glass-card p-3 rounded-xl flex justify-between items-center gap-2 fade-in';
                    card.innerHTML = `
                        <div class="overflow-hidden flex-1"><h4 class="font-medium text-xs text-gray-200 truncate">${item.title}</h4>
                        ${item.url ? `<a href="${item.url}" target="_blank" class="text-[10px] text-indigo-400 block mt-0.5 truncate">🔗 Mở link liên kết</a>` : ''}</div>
                        <div class="flex gap-2 shrink-0">
                            <button onclick="openFormModal('vault', '${item.id}')" class="text-xs text-gray-500">✏️</button>
                            <button onclick="deleteVaultItem('${item.id}')" class="text-xs text-gray-500">✕</button>
                        </div>`;
                    container.appendChild(card);
                }
            });
        }

        function filterVault(cat) { 
            currentVaultCategory = cat; 
            document.querySelectorAll('.vault-filter-btn').forEach(b => b.className = "vault-filter-btn bg-gray-900/60 border border-gray-800 py-2 rounded-xl text-gray-400"); 
            document.getElementById(`vbtn-${cat}`).className = "vault-filter-btn bg-pink-600 py-2 rounded-xl text-white font-medium"; 
            
            const titleEl = document.getElementById('vault-title-text');
            const descEl = document.getElementById('vault-desc-text');
            if (cat === 'wishlist') { titleEl.innerText = "Kho Lưu Trữ Vô Tận"; descEl.innerText = "Nơi lưu trữ những món đồ riêng tư của bạn"; }
            else if (cat === 'media') { titleEl.innerText = "Media Hub 🎬"; descEl.innerText = "Cất giữ phim ảnh, bài hát hoặc video hay"; }
            else if (cat === 'study') { titleEl.innerText = "Study Corner 📚"; descEl.innerText = "Lưu trữ bài viết hoặc link học tập quan trọng"; }
            else if (cat === 'braindump') { titleEl.innerText = "Secret Moments 🤫"; descEl.innerText = "Không gian cất giấu hình ảnh & video thầm kín"; }
            
            loadVault(); 
        }

        function deleteVaultItem(id) { 
            customConfirm("Xóa mục này khỏi kho lưu trữ?", () => { 
                const item = vaultItems.find(i => i.id === id);
                if (item && item.isIndexedDB) {
                    deleteMediaFromDB(id); // Xóa file vật lý trong database ngầm
                }
                vaultItems = vaultItems.filter(i => i.id !== id); 
                saveData('vault'); 
                loadVault(); 
            }); 
        }

        window.addEventListener('DOMContentLoaded', () => { 
            filterVault('wishlist'); 
            setTimeout(() => { 
                const intro = document.getElementById('intro-screen'); 
                if(intro){ intro.classList.add('intro-hide'); setTimeout(()=>intro.remove(),600); } 
            }, 1200); 
        });
    </script>
</body>
</html>
